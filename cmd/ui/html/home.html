{{ template "head" . }}


<div class="container-md">
    <h1>
        {{ or .Msg.Message }}
    </h1>

    {{ template "navbar" . }}

    {{ block "snippet-form" . }}

    <!--- bootstrap collapse with button-->
    <p class="d-inline-flex gap-1">
        <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#collapseForm"
            aria-expanded="false" aria-controls="collapseForm">
            Create a new snippet
        </button>
    </p>
    <!--- bootstrap collapse with button-->
    <!-- Collapse data-bs-target  -->
    <div {{ if .Msg.Error }}class="collapse show"{{ else }}class="collapse"{{ end }} id="collapseForm">
        <div class="card card-body">
            {{ if .Msg.Error }}<p>{{ or .Msg.Error "" }}</p>{{ end }}
            <form method="post" action="/snippet/create" class="my-1">
                <div class="form-row">
                    <div class="form-group mb-3">
                        <label for="title" {{ if .Msg.ErrorTitle }} class="text-danger"{{ end }}>{{ or .Msg.ErrorTitle "Title" }}</label>
                        <input type="text" 
                            name="title" 
                            class="form-control" 
                            id="title" 
                            aria-describedby="titleHelp"
                            placeholder="title"
                            value="{{ or .Msg.BackTitle }}"
                            >
                        <small id="titleHelp" class="form-text text-muted">Snippet title</small>
                    </div>
                    <div class="form-group mb-3">
                        <label for="content" {{ if .Msg.ErrorContent }} class="text-danger"{{ end }}>{{ or .Msg.ErrorContent "Content" }}</label>
                        <textarea name="content" class="form-control" id="content" placeholder="Content">{{ or .Msg.BackContent }}</textarea>
                        <small id="contentHelp" class="form-text text-muted">Snippet content</small>
                    </div>
                    <div class="form-group mb-3">
                        <label for="expires" {{ if .Msg.ErrorDate }} class="text-danger"{{ end }}>{{ or .Msg.ErrorDate "Date:" }}</label>
                        <input type="date" id="expires" name="expires" value="{{ or .Msg.BackDate CurrentDay }}" min="{{ CurrentDay }}"
                            max="2030-12-31">
                        <small id="expiresHelp" class="form-text text-muted">Snippet expiration date</small>
                    </div>
                    <div>
                        <label>Delete in:</label>
                        <input type='radio' name='expires' value='365' checked> One Year
                        <input type='radio' name='expires' value='7'> One Week
                        <input type='radio' name='expires' value='1'> One Day
                    </div>
                </div>
                <button type="submit" class="btn btn-primary my-4">Submit</button>
            </form>
        </div>
    </div>
    <!-- end of Collapse form-->
    
    {{ end }}

</div>
{{ template "footer" . }}
